llm:
  provider: ollama
  model: hermes3:8b  # Using hermes3:8b for best instruction following
  host: localhost
  port: 11434
  temperature: 0.0
  max_tokens: 500

retrieval:
  backend: langchain  # Options: chroma, langchain, llama_index  
  top_k: 6
  chunk_size: 700
  chunk_overlap: 120
  reranker: none

memory:
  directory: .state/memory
  buffer_limit: 10
  summary_mode: true

logging:
  path: logs/run.jsonl
